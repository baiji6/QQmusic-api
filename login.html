<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QQ Music 登录</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #0f1115;
      color: #e6e6e6;
      min-height: 100vh;
    }
    header {
      padding: 18px 24px;
      background: #16191f;
      border-bottom: 1px solid #232830;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }
    header h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 600;
      color: #4ea1ff;
    }
    header a {
      margin-left: auto;
      font-size: 13px;
      color: #8a909c;
      text-decoration: none;
      padding: 6px 12px;
      border: 1px solid #2a313c;
      border-radius: 6px;
      transition: all .15s;
    }
    header a:hover { color: #4ea1ff; border-color: #4ea1ff; }
    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #555;
      margin-right: 4px;
      vertical-align: middle;
    }
    .status-dot.online { background: #4ade80; }
    .status-dot.offline { background: #f87171; }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px;
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      border-bottom: 1px solid #232830;
    }
    .tabs button {
      padding: 10px 22px;
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      color: #8a909c;
      font-size: 14px;
      cursor: pointer;
      transition: all .15s;
    }
    .tabs button:hover { color: #c0c5cf; }
    .tabs button.active {
      color: #4ea1ff;
      border-bottom-color: #4ea1ff;
    }

    .section {
      background: #16191f;
      border: 1px solid #232830;
      border-radius: 10px;
      padding: 24px;
      margin-bottom: 16px;
    }
    .section h2 {
      margin: 0 0 18px 0;
      font-size: 15px;
      color: #c0c5cf;
      font-weight: 600;
      border-left: 3px solid #4ea1ff;
      padding-left: 10px;
    }

    /* QQ 二维码登录 */
    .qr-wrap {
      display: flex;
      gap: 24px;
      align-items: flex-start;
      flex-wrap: wrap;
    }
    .qr-box {
      width: 200px;
      height: 200px;
      background: #fff;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
    }
    .qr-box img { width: 100%; height: 100%; object-fit: contain; }
    .qr-box.loading::after {
      content: "加载中…";
      color: #555;
      font-size: 13px;
    }
    .qr-info {
      flex: 1;
      min-width: 240px;
    }
    .qr-state {
      font-size: 14px;
      margin-bottom: 12px;
      padding: 10px 14px;
      border-radius: 6px;
      background: #1a1e26;
      border: 1px solid #2a313c;
    }
    .qr-state.scan { border-color: #4ea1ff; color: #4ea1ff; }
    .qr-state.conf { border-color: #facc15; color: #facc15; }
    .qr-state.done { border-color: #4ade80; color: #4ade80; }
    .qr-state.err { border-color: #f87171; color: #f87171; }
    .qr-hint {
      font-size: 12px;
      color: #6a7080;
      line-height: 1.8;
    }

    /* 手机登录 */
    .form-row {
      display: flex;
      gap: 10px;
      margin-bottom: 14px;
      align-items: center;
      flex-wrap: wrap;
    }
    .form-row label {
      font-size: 13px;
      color: #8a909c;
      min-width: 80px;
    }
    .form-row input {
      flex: 1;
      min-width: 180px;
      padding: 10px 12px;
      background: #1a1e26;
      border: 1px solid #2a313c;
      border-radius: 6px;
      color: #e6e6e6;
      font-size: 14px;
      outline: none;
      transition: border-color .15s;
    }
    .form-row input:focus { border-color: #4ea1ff; }
    .form-row input::placeholder { color: #5a6170; }
    .form-row input.small { flex: 0 0 100px; }
    .form-row button {
      padding: 10px 18px;
      background: #4ea1ff;
      color: #0f1115;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
    }
    .form-row button:hover:not(:disabled) { background: #6bb3ff; }
    .form-row button:disabled { background: #2a313c; color: #6a7080; cursor: not-allowed; }
    .form-row .countdown {
      font-size: 12px;
      color: #6a7080;
      min-width: 60px;
    }

    /* 当前状态卡片 */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 12px;
    }
    .stat-item {
      background: #1a1e26;
      border: 1px solid #2a313c;
      border-radius: 6px;
      padding: 12px;
    }
    .stat-item .k {
      font-size: 11px;
      color: #6a7080;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: .5px;
    }
    .stat-item .v {
      font-size: 13px;
      color: #e6e6e6;
      font-family: monospace;
      word-break: break-all;
    }
    .stat-item .v.ok { color: #4ade80; }
    .stat-item .v.warn { color: #facc15; }
    .stat-item .v.err { color: #f87171; }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 16px;
      flex-wrap: wrap;
    }
    .actions button {
      padding: 10px 18px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      transition: all .15s;
      border: 1px solid #2a313c;
      background: #1a1e26;
      color: #c0c5cf;
    }
    .actions button:hover:not(:disabled) { border-color: #4ea1ff; color: #4ea1ff; }
    .actions button:disabled { opacity: .5; cursor: not-allowed; }
    .actions button.danger { border-color: #5e2d2d; color: #f87171; }
    .actions button.danger:hover:not(:disabled) { background: #2a1717; color: #f87171; }

    /* 用户信息卡片 */
    .user-card {
      display: flex;
      gap: 18px;
      align-items: center;
      flex-wrap: wrap;
    }
    .user-avatar {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: #232830;
      object-fit: cover;
      flex-shrink: 0;
      border: 2px solid #2a313c;
    }
    .user-main {
      flex: 1;
      min-width: 220px;
    }
    .user-name {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 4px;
      word-break: break-all;
    }
    .user-tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 6px;
    }
    .tag {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 4px;
      background: #1a1e26;
      border: 1px solid #2a313c;
      color: #8a909c;
    }
    .tag.vip { color: #facc15; border-color: #5e512d; }
    .tag.green { color: #4ade80; border-color: #2d5e3c; }
    .tag.blue { color: #4ea1ff; border-color: #2d4a5e; }
    .user-meta {
      font-size: 12px;
      color: #8a909c;
      line-height: 1.7;
    }
    .user-meta span { margin-right: 14px; }
    .raw-toggle {
      margin-top: 14px;
      font-size: 12px;
      color: #4ea1ff;
      cursor: pointer;
      user-select: none;
    }
    .raw-toggle:hover { text-decoration: underline; }
    .raw-json {
      margin-top: 10px;
      max-height: 300px;
      overflow: auto;
      background: #0f1115;
      border: 1px solid #2a313c;
      border-radius: 6px;
      padding: 12px;
      font-size: 12px;
      font-family: monospace;
      color: #c0c5cf;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .msg {
      margin-top: 14px;
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 13px;
      display: none;
    }
    .msg.show { display: block; }
    .msg.info { background: #1a1e26; border: 1px solid #2a313c; color: #c0c5cf; }
    .msg.ok { background: #16291c; border: 1px solid #2d5e3c; color: #4ade80; }
    .msg.err { background: #2a1717; border: 1px solid #5e2d2d; color: #f87171; word-break: break-all; }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <header>
    <h1>QQ Music 登录</h1>
    <span class="status-dot" id="statusDot"></span><span id="statusText" style="font-size:12px;color:#8a909c;">检测中…</span>
    <a href="/">返回首页</a>
  </header>

  <div class="container">
    <!-- 当前登录状态 -->
    <div class="section">
      <h2>当前登录状态</h2>
      <div class="stat-grid" id="statGrid"></div>
      <div class="actions">
        <button id="refreshBtn">刷新状态</button>
        <button id="refreshCredBtn">刷新凭证</button>
        <button id="logoutBtn" class="danger">退出登录</button>
      </div>
      <div class="msg" id="statusMsg"></div>
    </div>

    <!-- 当前用户信息 -->
    <div class="section hidden" id="userInfoSection">
      <h2>当前用户信息</h2>
      <div id="userInfoBody">
        <div class="user-card" id="userCard"></div>
        <div class="raw-toggle" id="rawToggle">▶ 查看原始 JSON</div>
        <div class="raw-json hidden" id="rawJson"></div>
      </div>
      <div class="msg" id="userInfoMsg"></div>
    </div>

    <!-- 登录方式 -->
    <div class="section">
      <h2>登录方式</h2>
      <div class="tabs">
        <button class="active" data-tab="qr">QQ 二维码登录</button>
        <button data-tab="phone">手机验证码登录</button>
      </div>

      <!-- QQ 二维码 -->
      <div id="qrPanel">
        <div class="qr-wrap">
          <div class="qr-box loading" id="qrBox"></div>
          <div class="qr-info">
            <div class="qr-state" id="qrState">等待获取二维码…</div>
            <div class="qr-hint">
              使用 QQ 手机客户端扫描左侧二维码完成登录。<br>
              状态说明：<br>
              · SCAN  - 已扫码，等待确认<br>
              · CONF  - 已确认，等待授权<br>
              · DONE  - 登录成功<br>
              · REFUSE - 已拒绝<br>
              · TIMEOUT - 二维码已过期，请刷新
            </div>
            <div class="actions">
              <button id="qrRefreshBtn">刷新二维码</button>
            </div>
          </div>
        </div>
        <div class="msg" id="qrMsg"></div>
      </div>

      <!-- 手机验证码 -->
      <div id="phonePanel" class="hidden">
        <div class="form-row">
          <label>国家代码</label>
          <input class="small" id="ccInput" type="text" value="86" />
          <label>手机号</label>
          <input id="phoneInput" type="text" placeholder="11 位手机号" />
        </div>
        <div class="form-row">
          <label>验证码</label>
          <input id="codeInput" type="text" placeholder="6 位验证码" />
          <button id="sendCodeBtn">发送验证码</button>
          <span class="countdown" id="countdown"></span>
        </div>
        <div class="actions">
          <button id="phoneLoginBtn">登录</button>
        </div>
        <div class="msg" id="phoneMsg"></div>
      </div>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);

    async function api(path, options) {
      const r = await fetch(path, options);
      const j = await r.json();
      if (j.code !== 0) throw new Error(j.message || `code ${j.code}`);
      return j.data;
    }

    function showMsg(el, type, text) {
      el.className = `msg show ${type}`;
      el.textContent = text;
    }

    // ==================== 状态 ====================

    async function checkStatus() {
      try {
        const d = await api("/login/status");
        $("statusDot").className = "status-dot " + (d.loggedIn ? "online" : "offline");
        $("statusText").textContent = d.loggedIn ? `已登录: ${d.musicid}` : "未登录";
        renderStatus(d);
        // 已登录则加载用户信息, 未登录则隐藏
        if (d.loggedIn) loadUserInfo();
        else $("userInfoSection").classList.add("hidden");
      } catch (e) {
        $("statusDot").className = "status-dot offline";
        $("statusText").textContent = "服务离线";
        showMsg($("statusMsg"), "err", `状态检查失败: ${e.message}`);
        $("userInfoSection").classList.add("hidden");
      }
    }

    function renderStatus(d) {
      const grid = $("statGrid");
      grid.innerHTML = "";
      const items = [
        { k: "登录状态", v: d.loggedIn ? "已登录" : "未登录", cls: d.loggedIn ? "ok" : "err" },
        { k: "musicid", v: d.musicid || "-", cls: "" },
        { k: "凭证过期", v: d.expired ? "是" : "否", cls: d.expired ? "warn" : "ok" },
        { k: "凭证文件", v: d.file || "-", cls: "" }
      ];
      for (const it of items) {
        const el = document.createElement("div");
        el.className = "stat-item";
        el.innerHTML = `<div class="k">${it.k}</div><div class="v ${it.cls}">${it.v}</div>`;
        grid.appendChild(el);
      }
    }

    // ==================== 用户信息 ====================

    async function loadUserInfo() {
      $("userInfoSection").classList.remove("hidden");
      $("userCard").innerHTML = '<div style="color:#6a7080;font-size:13px;">加载中…</div>';
      try {
        const d = await api("/user/self");
        renderUserInfo(d);
      } catch (e) {
        $("userCard").innerHTML = "";
        showMsg($("userInfoMsg"), "err", `获取用户信息失败: ${e.message}`);
      }
    }

    // 深度递归收集所有 {键: 值} 路径 (只处理对象和基本类型)
    function flattenKeys(obj, prefix = "", out = {}) {
      if (obj === null || obj === undefined) return out;
      if (typeof obj !== "object") return out;
      if (Array.isArray(obj)) {
        obj.forEach((v, i) => flattenKeys(v, `${prefix}[${i}]`, out));
        return out;
      }
      for (const [k, v] of Object.entries(obj)) {
        const path = prefix ? `${prefix}.${k}` : k;
        if (v !== null && v !== undefined && typeof v !== "object") {
          out[path] = v;
        } else if (typeof v === "object") {
          flattenKeys(v, path, out);
        }
      }
      return out;
    }

    // 不区分大小写匹配键名
    function pickByKeys(flat, keys) {
      const lowerKeys = keys.map(k => k.toLowerCase());
      for (const [path, v] of Object.entries(flat)) {
        const last = path.split(".").pop().split("[")[0].toLowerCase();
        if (lowerKeys.includes(last)) return v;
      }
      return "";
    }
    // 匹配头像 URL (http 链接且包含图片特征)
    function pickAvatar(flat) {
      // 优先: 键名包含 head/avatar/pic/logo 且值是 URL
      const nameKeys = ["headpic", "headpicurl", "avatar", "avatarurl", "pic", "logo", "head", "portrait", "face", "photo"];
      for (const [path, v] of Object.entries(flat)) {
        const last = path.split(".").pop().split("[")[0].toLowerCase();
        if (nameKeys.includes(last) && typeof v === "string" && /^https?:\/\//.test(v)) return v;
      }
      // 兜底: 任意 URL 值且包含图片特征
      for (const [path, v] of Object.entries(flat)) {
        if (typeof v === "string" && /^https?:\/\//.test(v) && /\.(jpg|jpeg|png|webp|gif)/i.test(v)) return v;
      }
      return "";
    }
    // 匹配昵称 (键名含 nick/name, 值是非空字符串且非数字非 URL)
    function pickNickname(flat) {
      const nameKeys = ["nick", "nickname", "strnickname", "name", "username", "displayname", "strnick"];
      for (const [path, v] of Object.entries(flat)) {
        const last = path.split(".").pop().split("[")[0].toLowerCase();
        if (nameKeys.includes(last) && typeof v === "string" && v.trim() && !/^https?:\/\//.test(v) && isNaN(Number(v))) return v;
      }
      return "";
    }

    function renderUserInfo(d) {
      showMsg($("userInfoMsg"), "", "");
      $("userInfoMsg").classList.remove("show");

      // 把整个响应扁平化, 不再假设 data 包装层
      const flat = flattenKeys(d);
      const nickname = pickNickname(flat);
      const avatar = pickAvatar(flat);
      const uin = pickByKeys(flat, ["uin", "musicid", "struin", "strmusicid", "uid"]);
      const gender = pickByKeys(flat, ["gender", "sex"]);
      const age = pickByKeys(flat, ["age"]);
      const country = pickByKeys(flat, ["country", "countryname"]);
      const province = pickByKeys(flat, ["province", "provincename"]);
      const city = pickByKeys(flat, ["city", "cityname"]);
      const vipLevel = pickByKeys(flat, ["viplevel", "viplevel", "ndiamondlevel", "diamondlevel", "diamond"]);
      const isVip = pickByKeys(flat, ["isvip", "vipflag", "bvip", "isvipUser"]);
      const fansNum = pickByKeys(flat, ["fansnum", "fansnumber", "nfans", "fans"]);
      const followNum = pickByKeys(flat, ["follownum", "follownumber", "nfollows", "follows", "follow"]);
      const songNum = pickByKeys(flat, ["songnum", "songnumber", "nsongnum", "songs"]);
      const playlistNum = pickByKeys(flat, ["playlistnum", "songlistnum", "nsonglist", "playlist"]);
      const intro = pickByKeys(flat, ["intro", "signature", "description", "strintro", "sign"]);

      // 渲染头像 + 昵称
      const card = $("userCard");
      card.innerHTML = "";
      if (avatar) {
        const img = document.createElement("img");
        img.className = "user-avatar";
        img.src = avatar;
        img.alt = "avatar";
        img.onerror = () => { img.style.display = "none"; };
        card.appendChild(img);
      } else {
        const ph = document.createElement("div");
        ph.className = "user-avatar";
        ph.style.display = "flex";
        ph.style.alignItems = "center";
        ph.style.justifyContent = "center";
        ph.style.fontSize = "32px";
        ph.style.color = "#6a7080";
        ph.textContent = "?";
        card.appendChild(ph);
      }

      const main = document.createElement("div");
      main.className = "user-main";

      const nameEl = document.createElement("div");
      nameEl.className = "user-name";
      nameEl.textContent = nickname || "(未知昵称)";
      main.appendChild(nameEl);

      // 调试提示: 若未识别到昵称/头像, 给出提示
      if (!nickname || !avatar) {
        const tip = document.createElement("div");
        tip.style.cssText = "font-size:11px;color:#facc15;margin-top:4px;";
        const missing = [];
        if (!nickname) missing.push("昵称");
        if (!avatar) missing.push("头像");
        tip.textContent = `⚠ 未识别到${missing.join("/")}，请展开下方原始 JSON 查看实际字段名`;
        main.appendChild(tip);
      }

      // 标签
      const tags = document.createElement("div");
      tags.className = "user-tags";
      if (isVip || vipLevel) tags.innerHTML += `<span class="tag vip">VIP${vipLevel ? " " + vipLevel : ""}</span>`;
      if (uin) tags.innerHTML += `<span class="tag blue">QQ: ${uin}</span>`;
      if (gender !== "") {
        const g = String(gender) === "1" ? "男" : String(gender) === "2" ? "女" : "保密";
        tags.innerHTML += `<span class="tag">${g}</span>`;
      }
      if (tags.innerHTML) main.appendChild(tags);

      // 详细元信息
      const meta = document.createElement("div");
      meta.className = "user-meta";
      let metaHtml = "";
      if (country || province || city) {
        const loc = [country, province, city].filter(Boolean).join(" / ");
        metaHtml += `<span>📍 ${loc}</span>`;
      }
      if (age) metaHtml += `<span>🎂 ${age} 岁</span>`;
      if (fansNum !== "") metaHtml += `<span>👥 粉丝 ${fansNum}</span>`;
      if (followNum !== "") metaHtml += `<span>➤ 关注 ${followNum}</span>`;
      if (songNum !== "") metaHtml += `<span>🎵 歌曲 ${songNum}</span>`;
      if (playlistNum !== "") metaHtml += `<span>📋 歌单 ${playlistNum}</span>`;
      meta.innerHTML = metaHtml;
      main.appendChild(meta);

      if (intro) {
        const introEl = document.createElement("div");
        introEl.style.cssText = "font-size:12px;color:#8a909c;margin-top:6px;line-height:1.6;";
        introEl.textContent = `“${intro}”`;
        main.appendChild(introEl);
      }

      card.appendChild(main);

      // 原始 JSON (默认展开, 方便核对字段)
      $("rawJson").textContent = JSON.stringify(d, null, 2);
      $("rawJson").classList.remove("hidden");
      $("rawToggle").textContent = "▼ 收起原始 JSON";
    }

    // 原始 JSON 展开/收起
    $("rawToggle").addEventListener("click", () => {
      const box = $("rawJson");
      const toggle = $("rawToggle");
      if (box.classList.contains("hidden")) {
        box.classList.remove("hidden");
        toggle.textContent = "▼ 收起原始 JSON";
      } else {
        box.classList.add("hidden");
        toggle.textContent = "▶ 查看原始 JSON";
      }
    });

    // ==================== Tabs ====================

    document.querySelectorAll(".tabs button").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".tabs button").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        const tab = btn.dataset.tab;
        $("qrPanel").classList.toggle("hidden", tab !== "qr");
        $("phonePanel").classList.toggle("hidden", tab !== "phone");
      });
    });

    // ==================== QQ 二维码 ====================

    let qrIdentifier = null;
    let qrPollTimer = null;

    async function loadQrCode() {
      $("qrBox").className = "qr-box loading";
      $("qrBox").innerHTML = "";
      $("qrState").className = "qr-state";
      $("qrState").textContent = "正在获取二维码…";
      try {
        const d = await api("/login/qrcode", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ type: "qq" })
        });
        qrIdentifier = d.identifier;
        $("qrBox").className = "qr-box";
        const img = document.createElement("img");
        img.src = `data:${d.mime};base64,${d.data}`;
        img.alt = "QR";
        $("qrBox").appendChild(img);
        $("qrState").className = "qr-state";
        $("qrState").textContent = "请使用 QQ 扫描二维码";
        startQrPoll();
      } catch (e) {
        $("qrState").className = "qr-state err";
        $("qrState").textContent = `获取二维码失败: ${e.message}`;
        showMsg($("qrMsg"), "err", e.message);
      }
    }

    function startQrPoll() {
      stopQrPoll();
      qrPollTimer = setInterval(pollQr, 2000);
    }

    function stopQrPoll() {
      if (qrPollTimer) { clearInterval(qrPollTimer); qrPollTimer = null; }
    }

    async function pollQr() {
      if (!qrIdentifier) return;
      try {
        const d = await api("/login/checkQrcode", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ identifier: qrIdentifier, type: "qq" })
        });
        const ev = d.event;
        const map = { 0: "DONE", 1: "SCAN", 2: "CONF", 3: "REFUSE", 4: "TIMEOUT", "-1": "OTHER" };
        const name = map[ev] || `UNKNOWN(${ev})`;
        const clsMap = { 0: "done", 1: "scan", 2: "conf", 3: "err", 4: "err", "-1": "err" };
        $("qrState").className = `qr-state ${clsMap[ev] || "err"}`;
        const hintMap = {
          0: "登录成功",
          1: "已扫码，请在手机上确认",
          2: "已确认，正在授权…",
          3: "已拒绝登录",
          4: "二维码已过期，请刷新"
        };
        $("qrState").textContent = `[${name}] ${hintMap[ev] || "未知状态"}`;

        if (ev === 0) {
          stopQrPoll();
          showMsg($("qrMsg"), "ok", "登录成功！");
          checkStatus();
        } else if (ev === 3 || ev === 4 || ev === -1) {
          stopQrPoll();
        }
      } catch (e) {
        stopQrPoll();
        $("qrState").className = "qr-state err";
        $("qrState").textContent = `轮询失败: ${e.message}`;
      }
    }

    $("qrRefreshBtn").addEventListener("click", loadQrCode);

    // ==================== 手机验证码 ====================

    let countdownTimer = null;
    function startCountdown(sec) {
      stopCountdown();
      $("countdown").textContent = `${sec}s`;
      $("sendCodeBtn").disabled = true;
      countdownTimer = setInterval(() => {
        sec--;
        if (sec <= 0) {
          stopCountdown();
          $("countdown").textContent = "";
          $("sendCodeBtn").disabled = false;
        } else {
          $("countdown").textContent = `${sec}s`;
        }
      }, 1000);
    }
    function stopCountdown() {
      if (countdownTimer) { clearInterval(countdownTimer); countdownTimer = null; }
    }

    $("sendCodeBtn").addEventListener("click", async () => {
      const phone = $("phoneInput").value.trim();
      const cc = $("ccInput").value.trim() || "86";
      if (!phone) { showMsg($("phoneMsg"), "err", "请输入手机号"); return; }
      try {
        const d = await api("/login/sendAuthcode", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ phone: Number(phone), countryCode: Number(cc) })
        });
        if (d.event === "SEND") {
          showMsg($("phoneMsg"), "ok", "验证码已发送，请查收短信");
          startCountdown(60);
        } else if (d.event === "CAPTCHA") {
          showMsg($("phoneMsg"), "err", "需要人机验证，暂不支持");
        } else if (d.event === "FREQUENCY") {
          showMsg($("phoneMsg"), "err", "发送过于频繁，请稍后再试");
          startCountdown(30);
        } else {
          showMsg($("phoneMsg"), "err", `未知响应: ${d.event}`);
        }
      } catch (e) {
        showMsg($("phoneMsg"), "err", `发送失败: ${e.message}`);
      }
    });

    $("phoneLoginBtn").addEventListener("click", async () => {
      const phone = $("phoneInput").value.trim();
      const code = $("codeInput").value.trim();
      const cc = $("ccInput").value.trim() || "86";
      if (!phone) { showMsg($("phoneMsg"), "err", "请输入手机号"); return; }
      if (!code) { showMsg($("phoneMsg"), "err", "请输入验证码"); return; }
      try {
        $("phoneLoginBtn").disabled = true;
        await api("/login/phone", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ phone: Number(phone), code, countryCode: Number(cc) })
        });
        showMsg($("phoneMsg"), "ok", "登录成功！");
        checkStatus();
      } catch (e) {
        showMsg($("phoneMsg"), "err", `登录失败: ${e.message}`);
      } finally {
        $("phoneLoginBtn").disabled = false;
      }
    });

    // ==================== 凭证操作 ====================

    $("refreshBtn").addEventListener("click", checkStatus);

    $("refreshCredBtn").addEventListener("click", async () => {
      try {
        $("refreshCredBtn").disabled = true;
        await api("/login/refresh", { method: "POST" });
        showMsg($("statusMsg"), "ok", "凭证已刷新");
        checkStatus();
      } catch (e) {
        showMsg($("statusMsg"), "err", `刷新失败: ${e.message}`);
      } finally {
        $("refreshCredBtn").disabled = false;
      }
    });

    $("logoutBtn").addEventListener("click", async () => {
      if (!confirm("确定要退出登录吗？")) return;
      try {
        $("logoutBtn").disabled = true;
        await api("/login/logout", { method: "POST" });
        showMsg($("statusMsg"), "ok", "已退出登录");
        checkStatus();
      } catch (e) {
        showMsg($("statusMsg"), "err", `退出失败: ${e.message}`);
      } finally {
        $("logoutBtn").disabled = false;
      }
    });

    // 启动
    checkStatus();
    loadQrCode();
  </script>
</body>
</html>
